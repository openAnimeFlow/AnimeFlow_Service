server:
  port: 1024
spring:
  application:
    name: AnimeFlow-Service
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/anime_flow?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 200309
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      username:
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

anime-flow:
  dandanplay:
    app_id: ${DANDANPLAY_ID}
    secret: ${DANDANPLAY_SECRET}

  bangumi:
    client_id: ${CLIENT_ID}
    client_secret: ${CLIENT_SECRET}
    redirect_uri: ${REDIRECT_URI}

  ## 接口限流
  rate-limit:
    enabled: true
    max-requests: 30   #单个时间窗口内允许的最大请求次数。
    window-seconds: 60  #时间窗口长度（秒）。
    path-patterns: #拦截路径
      - /api/**
    exclude-path-patterns: [] #放行路径