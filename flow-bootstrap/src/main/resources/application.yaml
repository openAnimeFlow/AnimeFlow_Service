server:
  port: 1024
spring:
  application:
    name: AnimeFlow-Service
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/anime_flow?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 200309
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      username: ${REDIS_USERNAME}
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

anime-flow:
  api-auth:
    enabled: true
    app_id: ${ANIME_FLOW_APP_ID}
    secret: ${ANIME_FLOW_SECRET}
    timestamp-skew-seconds: 300
    path-patterns:
      - /api/**
    exclude-path-patterns:
      - /api/oauth/callback
      - /api/no_session
      - /api/oauth-success
      - /api/success
      
  dandanplay:
    app_id: ${DANDANPLAY_ID}
    secret: ${DANDANPLAY_SECRET}

  bangumi:
    client_id: ${CLIENT_ID}
    client_secret: ${CLIENT_SECRET}
    redirect_uri: ${REDIRECT_URI}
    user-agent: openAnimeFlow/AnimeFlow_Service (https://github.com/openAnimeFlow/AnimeFlow_Service) #bangumi使用的 User Agent(官方要求)
    # Bangumi API超时时间（秒），不低于 5
    request-timeout-seconds: 30

  sync:
    archive:
      enabled: true
      run-on-startup-if-missing: true
      latest-url: https://raw.githubusercontent.com/openAnimeFlow/animeFlow-assets/main/archive/latest.json
      cron: "0 0 3 * * *"
      batch-size: 500
      batch-delay-ms: 50
      download-dir: ${java.io.tmpdir}/bangumi-archive
      lock-ttl-seconds: 21600
      connect-timeout-seconds: 30
      read-timeout-seconds: 3600

    background-image:
      enabled: true
      run-on-startup-if-missing: true
      index-url: https://raw.githubusercontent.com/openAnimeFlow/animeFlow-assets/main/background-image/index.json
      cron: "0 30 4 * * *"
      connect-timeout-seconds: 15
      read-timeout-seconds: 30

  resend:
    api_key: ${RESEND_API_KEY}
    domain: ${RESEND_DOMAIN}

  jwt:
    secret: ${JWT_SECRET}
    expire-seconds: 7200
    refresh-expire-seconds: 604800

  ## 接口限流
  rate-limit:
    enabled: true
    max-requests: 60   #单个时间窗口内允许的最大请求次数。
    window-seconds: 60  #时间窗口长度（秒）。
    path-patterns: #拦截路径
      - /api/v1/**
    exclude-path-patterns: [] #放行路径

  ## 对象存储
  cloudflare:
    r2:
      endpoint: ${CLOUDFLARE_R2_ENDPOINT}
      access-key: ${CLOUDFLARE_R2_ACCESS_KEY}
      secret-key: ${CLOUDFLARE_R2_SECRET_KEY}
      bucket: ${CLOUDFLARE_R2_BUCKET}
      public-url: ${CLOUDFLARE_R2_PUBLIC_URL}
