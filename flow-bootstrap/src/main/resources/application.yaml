server:
  port: 1024
spring:
  application:
    name: AnimeFlow-Service
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/anime_flow?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 200309
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      username:
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

bangumi:
  client_id: ${CLIENT_ID}
  client_secret: ${CLIENT_SECRET}
  redirect_uri: ${REDIRECT_URI}

dandanplay:
  app_id: ${DANDANPLAY_ID}
  secret: ${DANDANPLAY_SECRET}
  # 为 true 时由 Reactor Netty 打印完整 HTTP 请求/响应（含 X-AppSecret），仅本地排障；需同时把
  # logging.level.reactor.netty.http.client.HttpClient 设为 DEBUG
  http:
    wiretap: true