# 仅用于单元测试加载 Spring 上下文，不连接真实 Bangumi / 数据库
server:
  port: 0

bangumi:
  client_id: test-client-id
  client_secret: test-client-secret
  redirect_uri: http://localhost:1024/callback

anime-flow:
  jwt:
    secret: test-jwt-secret-key-at-least-32-chars
    expire-seconds: 3600
    refresh-expire-seconds: 86400

spring:
  datasource:
    url: jdbc:h2:mem:flow_bootstrap_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
